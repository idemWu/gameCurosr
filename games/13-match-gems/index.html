<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>晶石三消 · Longplay</title>
<link rel="stylesheet" href="./styles.css"/><link rel="stylesheet" href="./lib/pause.css"/>
</head><body>
<div id="app">
<header class="top"><h1>晶石三消</h1><p>60 关 · 4 世界 · 约 35–55 分钟</p></header>
<main>
<canvas id="game" width="480" height="270"></canvas>
<aside class="hud">
<div>世界 <span id="world">1</span> · 关卡 <span id="level">1</span>/60</div>
<div>步数 <span id="moves">0</span> · 消除 <span id="goal">0</span>/<span id="need">0</span></div>
<div>三星评价累计 <span id="stars">0</span></div>
<button id="reset">重置本关</button>
<button id="worldsel">世界选择</button>
<p class="hint">点选相邻宝石交换。通关全部 60 关结局。</p>
</aside></main>
<div id="overlay" class="overlay"><div class="panel">
<h2 id="overlay-title">晶石三消</h2><p id="overlay-msg"></p>
<button id="btn-continue">继续征程</button><button id="btn-start">新的图鉴</button>
<div id="worldbtns" class="row"></div>
</div></div></div>
<script src="./lib/save.js"></script><script src="./lib/pause.js"></script><script src="./main.js"></script>
</body></html>
