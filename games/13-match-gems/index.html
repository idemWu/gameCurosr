<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>晶石三消</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>晶石三消</h1>
        <p class="subtitle">三消闯关 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>世界</span><strong><span id="world">1</span> · 第 <span id="level">1</span>/60 关</strong></div>
        <div class="stat"><span>步数</span><strong id="moves">0</strong></div>
        <div class="stat"><span>消除</span><strong><span id="goal">0</span>/<span id="need">0</span></strong></div>
        <div class="stat"><span>三星累计</span><strong id="stars">0</strong></div>
        <button id="reset" class="primary" type="button">重置本关</button>
        <button id="worldsel" class="secondary" type="button">世界选择</button>
        <p class="hint">点选相邻宝石交换。步数用尽可重置本关。</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">晶石三消</h2>
          <p id="overlay-msg"></p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
