<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>林间轻旅</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>林间轻旅</h1>
        <p class="subtitle">探索战斗 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>区域</span><strong><span id="zone">1</span>/5</strong></div>
        <div class="stat"><span>任务</span><strong><span id="qi">1</span>/15</strong></div>
        <div class="stat"><span>生命</span><strong id="hp">8</strong></div>
        <div class="stat"><span>本区宝箱</span><strong><span id="loot">0</span>/<span id="need">0</span></strong></div>
        <div class="hp-bar" aria-hidden="true"><i id="hpbar"></i></div>
        <p id="qtext" class="quest-text">-</p>
        <button id="nextzone" type="button">进入下一区域</button>
        <p class="hint">WASD 移动 · 靠近敌人自动攻击 · 开宝箱推进任务</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">林间轻旅</h2>
          <p id="overlay-msg">五区域任务板，打怪开宝箱，完成十五件林务。</p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
