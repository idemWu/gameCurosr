<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>爪爪战棋</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="top"><h1>爪爪战棋</h1><p>3v3 小格子回合制</p></header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div>回合：<span id="turn">我方</span></div>
        <div id="info">点选爪爪</div>
        <button id="end" type="button">结束回合</button>
        <p class="hint">点选己方单位，再点目标格移动/攻击。消灭全部敌人。</p>
      </aside>
    </main>
    <div id="overlay" class="overlay"><div class="panel"><h2 id="overlay-title">爪爪战棋</h2><p id="overlay-msg"></p><button id="btn-start">开始</button></div></div>
  </div>
  <script src="./main.js"></script>
</body>
</html>
