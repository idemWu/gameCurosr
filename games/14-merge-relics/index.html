<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>遗物合成</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>遗物合成</h1>
      <p>18 项馆藏订单 · 8 级合成链 · 约 35–55 分钟</p>
    </header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div class="stat"><span>最高等级</span><strong>L<span id="max">1</span>/8</strong></div>
        <div class="order-panel">
          <div class="order-title">当前订单</div>
          <strong id="oname">—</strong>
          <p id="odesc" class="order-desc">—</p>
          <div class="stat"><span>目标</span><strong>L<span id="olv">2</span> × <span id="oneed">3</span></strong></div>
          <div class="stat"><span>进度</span><strong><span id="odone">0</span>/<span id="oneed2">3</span></strong></div>
          <div class="order-bar" aria-hidden="true"><i id="obar"></i></div>
        </div>
        <div class="stat"><span>订单</span><strong><span id="oi">1</span>/<span id="ototal">18</span></strong></div>
        <button id="spawn" type="button">召来 1 级遗物</button>
        <p class="hint">合成相同遗物升级。完成全部订单并做出 8 级遗物。</p>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <h2 id="overlay-title">遗物合成</h2>
        <p id="overlay-msg"></p>
        <button id="btn-continue" type="button">继续</button>
        <button id="btn-start" type="button">新游戏</button>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./main.js"></script>
</body>
</html>
