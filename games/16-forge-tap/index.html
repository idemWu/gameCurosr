<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>铁匠锻炉</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>铁匠锻炉</h1>
        <p class="subtitle">锻造配方 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>配方</span><strong><span id="rec">0</span>/<span id="rtotal">14</span></strong></div>
        <div class="stat"><span>当前</span><strong id="rname">—</strong></div>
        <div class="stat"><span>锤艺</span><strong>Lv <span id="hammer">1</span></strong></div>
        <div class="stat"><span>炉温</span><strong id="heatpct">0%</strong></div>
        <button id="heat" type="button">鼓风加热</button>
        <button id="forge" type="button">淬火锻造</button>
        <button id="up" class="secondary" type="button">升级锤艺</button>
        <p class="hint">鼓风升温，炉温落入甜区时锻造。锤艺加宽甜区、减缓冷却。</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">铁匠锻炉</h2>
          <p id="overlay-msg"></p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
