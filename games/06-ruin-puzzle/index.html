<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>石纹遗迹</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>石纹遗迹</h1>
      <p>四十关机关解谜 · 蓝开关与石门 · 约 12–22 分钟</p>
    </header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div class="stat"><span>关卡</span><strong><span id="level">1</span>/40</strong></div>
        <div class="stat"><span>石门</span><strong id="door">关闭</strong></div>
        <button id="reset" type="button" class="secondary">重置本关</button>
        <p class="hint">方向键移动 · 踩蓝开关切换石门 · 金格过关</p>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <h2 id="overlay-title">石纹遗迹</h2>
        <p id="overlay-msg">四十重遗迹机关，踩开关开门，抵达金色出口。</p>
        <button id="btn-continue" type="button">继续解谜</button>
        <button id="btn-start" type="button">新的探险</button>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./main.js"></script>
</body>
</html>
