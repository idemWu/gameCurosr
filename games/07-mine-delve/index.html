<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>矿灯深途</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>矿灯深途</h1>
        <p class="subtitle">下矿冒险 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>层数</span><strong>B<span id="floor">1</span>/25</strong></div>
        <div class="stat"><span>镐等级</span><strong id="pick">1</strong></div>
        <div class="stat"><span>生命</span><strong id="hp">8</strong></div>
        <div class="stat"><span>灯油</span><strong id="oil">100</strong></div>
        <div class="stat"><span>矿石</span><strong>铜 <span id="copper">0</span> · 秘银 <span id="mythril">0</span> · 金 <span id="gold">0</span></strong></div>
        <div class="stat"><span>任务</span><strong id="quest">-</strong></div>
        <div class="stat"><span>进度</span><strong><span id="qprog">0</span>/<span id="qneed">0</span> · 完成 <span id="qdone">0</span>/15</strong></div>
        <button id="up" class="secondary" type="button">升井 / 上一层</button>
        <button id="shop" type="button">休息站补给（金×5→油+40）</button>
        <p class="hint">方向键移动 · 蓝铜青秘银黄金红怪绿下层 · 灯油耗尽会掉血</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">矿灯深途</h2>
          <p id="overlay-msg">二十五层矿井与十五项任务，管理灯油与生命。</p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
