<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>矿灯深途</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="top"><h1>矿灯深途</h1><p>下矿挖矿石，留意生命与灯火，返回结算</p></header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div>层数：<span id="floor">1</span>/5</div>
        <div>生命：<span id="hp">5</span></div>
        <div>灯火：<span id="lamp">100</span></div>
        <div>矿石：<span id="ore">0</span></div>
        <button id="up" type="button">返回上一层 / 升井</button>
        <p class="hint">方向键移动，走到矿石上开采。碰到红怪掉血。灯火为 0 会持续掉血。第 5 层挖够再升井胜利（矿石≥12）。</p>
      </aside>
    </main>
    <div id="overlay" class="overlay"><div class="panel"><h2 id="overlay-title">矿灯深途</h2><p id="overlay-msg">深入五层，带回足够矿石。</p><button id="btn-start">下井</button></div></div>
  </div>
  <script src="./main.js"></script>
</body>
</html>
