<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>窗边小屋</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>窗边小屋</h1>
      <p>拖拽家具布置房间，达到目标分</p>
    </header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div>布置分：<span id="score">0</span> / <span id="goal">40</span></div>
        <div id="palette" class="palette"></div>
        <button id="clear" type="button">清空房间</button>
        <p class="hint">点选家具后，点击房间网格放置；再点已放家具可移除</p>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <h2 id="overlay-title">窗边小屋</h2>
        <p id="overlay-msg">布置房间达到 40 分。不同家具有不同分数与占地。</p>
        <button id="btn-start" type="button">开始布置</button>
      </div>
    </div>
  </div>
  <script src="./main.js"></script>
</body>
</html>
