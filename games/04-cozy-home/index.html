<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>窗边小屋</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>窗边小屋</h1>
        <p class="subtitle">布置委托 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>委托</span><strong><span id="ci">1</span>/12</strong></div>
        <div class="stat"><span>标题</span><strong id="ctitle">-</strong></div>
        <div class="stat"><span>评分</span><strong><span id="score">0</span> / <span id="goal">0</span></strong></div>
        <div class="stat"><span>房间</span><strong id="room">0</strong></div>
        <div id="palette" class="row"></div>
        <button id="clear" class="secondary" type="button">清空房间</button>
        <button id="submit" class="primary" type="button">提交布置</button>
        <p class="hint">先点家具再点网格放置；再点已放置家具可移除。</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">窗边小屋</h2>
          <p id="overlay-msg"></p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
