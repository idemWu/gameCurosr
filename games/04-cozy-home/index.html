<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>窗边小屋 · Longplay</title><link rel="stylesheet" href="./styles.css"/><link rel="stylesheet" href="./lib/pause.css"/>
</head><body><div id="app"><header class="top"><h1>窗边小屋</h1><p>12 委托布置 · 约 30–45 分钟</p></header>
<main><canvas id="game" width="480" height="270"></canvas><aside class="hud"><div>委托 <span id="ci">1</span>/12 · <span id="ctitle">-</span></div>
<div>分 <span id="score">0</span>/<span id="goal">0</span> · 房间 <span id="room">0</span></div>
<div id="palette" class="row"></div><button id="clear">清空</button><button id="submit">提交委托</button><p class="hint">放置家具达成分数，完成 12 个委托结局。</p></aside></main>
<div id="overlay" class="overlay"><div class="panel"><h2 id="overlay-title">窗边小屋</h2><p id="overlay-msg"></p>
<button id="btn-continue">继续</button><button id="btn-start">新游戏</button></div></div></div>
<script src="./lib/save.js"></script><script src="./lib/pause.js"></script><script src="./main.js"></script></body></html>
