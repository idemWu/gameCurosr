<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>港湾日记</title>
  <link rel="stylesheet" href="./ui-harbor.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">COZY HARBOR DIARY</div>
        <h1>港湾日记</h1>
        <p class="subtitle">七天海边日常 · 手账式界面 · 约 12–25 分钟</p>
      </div>
      <div class="chip">软厚涂样板 · 无种田</div>
    </header>

    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>

      <aside class="hud">
        <p class="hud-title">今日手账</p>
        <div class="stat-grid">
          <div class="stat-card">
            <span class="label">日程</span>
            <div class="value">第 <span id="day">1</span>/7 天</div>
          </div>
          <div class="stat-card">
            <span class="label">时段</span>
            <div class="value" id="period">清晨</div>
          </div>
          <div class="stat-card">
            <span class="label">区域</span>
            <div class="value" id="zone">码头</div>
          </div>
          <div class="stat-card">
            <span class="label">待办</span>
            <div class="value"><span id="done">0</span>/<span id="need">0</span></div>
          </div>
        </div>

        <div class="aff-wrap">
          <div class="aff-meta">
            <span>镇民好感</span>
            <strong id="aff">0</strong>
          </div>
          <div class="aff-bar" aria-hidden="true"><i id="affbar"></i></div>
        </div>

        <div class="quest-box">
          <h3>今日待办</h3>
          <ul id="quests" class="quest-list"></ul>
        </div>

        <p class="hint">WASD 移动 · E 交谈 · 完成待办后可结束今天</p>

        <div class="actions">
          <button id="endday" type="button" class="primary">结束今天</button>
          <button id="travel" type="button" class="secondary">前往下一区域</button>
        </div>
      </aside>
    </main>

    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="seal">港</div>
        <h2 id="overlay-title">港湾日记</h2>
        <p id="overlay-msg">翻开新的一周，去码头、广场与灯塔坡认识镇民吧。</p>
        <button id="btn-continue" type="button" class="warm">继续旅程</button>
        <button id="btn-start" type="button" class="primary">新的一周</button>
      </div>
    </div>
  </div>

  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
