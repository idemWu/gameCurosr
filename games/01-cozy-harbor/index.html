<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>港湾日记</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>港湾日记</h1>
      <p>七天海边小镇 · 光影与人情 · 约 12–25 分钟 · 无种田</p>
    </header>
    <main>
      <canvas id="game" width="480" height="270"></canvas>
      <aside class="hud">
        <div class="stat"><span>日程</span><strong>第 <span id="day">1</span>/7 天 · <span id="period">清晨</span></strong></div>
        <div class="stat"><span>今日待办</span><strong><span id="done">0</span>/<span id="need">0</span></strong></div>
        <div class="stat"><span>区域</span><strong id="zone">码头</strong></div>
        <div class="stat"><span>好感</span><strong id="aff">0</strong></div>
        <div class="aff-bar" aria-hidden="true"><i id="affbar"></i></div>
        <ul id="quests" class="quest-list"></ul>
        <p class="hint">WASD 移动 · E 交谈 · 做完当日待办后点「结束今天」</p>
        <button id="endday" type="button">结束今天</button>
        <button id="travel" type="button" class="secondary">前往下一区域</button>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <h2 id="overlay-title">港湾日记</h2>
        <p id="overlay-msg">在七天里认识镇民、完成待办，迎来灯火庆典。</p>
        <button id="btn-continue" type="button">继续旅程</button>
        <button id="btn-start" type="button">新的一周</button>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
