<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>桥上防线</title>
  <link rel="stylesheet" href="./ui-stardew.css" />
  <link rel="stylesheet" href="./lib/pause.css" />
</head>
<body>
  <div id="app">
    <header class="top">
      <div class="brand">
        <div class="eyebrow">gameCurosr</div>
        <h1>桥上防线</h1>
        <p class="subtitle">路径塔防 · 星露谷风 UI · 可存档</p>
      </div>
      <div class="chip">手绘风格 · 无种田</div>
    </header>
    <main class="stage">
      <section class="stage-frame" aria-label="游戏画面">
        <canvas id="game" width="480" height="270"></canvas>
      </section>
      <aside class="hud">
        <div class="hud-inner">
<div class="stat"><span>地图</span><strong><span id="st">1</span>/15</strong></div>
        <div class="stat"><span>波次</span><strong><span id="wave">0</span>/<span id="waves">0</span></strong></div>
        <div class="stat"><span>金币</span><strong id="gold">50</strong></div>
        <div class="stat"><span>生命</span><strong id="hp">12</strong></div>
        <div class="row tower-btns">
          <button id="t1" type="button" class="sel">箭塔 15</button>
          <button id="t2" type="button">冰塔 25</button>
        </div>
        <p id="tower-hint" class="hint">箭塔射程 75 · 冰塔减速</p>
        <button id="startwave" class="primary" type="button">开始下一波</button>
        <p class="hint">在灰点建塔，悬停预览射程。右下角可静音。</p>
        </div>
      </aside>
    </main>
    <div id="overlay" class="overlay">
      <div class="panel">
        <div class="panel-inner">
          <div class="seal">玩</div>
          <h2 id="overlay-title">桥上防线</h2>
          <p id="overlay-msg"></p>
          <button id="btn-continue" type="button" class="warm">继续游戏</button>
          <button id="btn-start" type="button" class="primary">新游戏</button>
        </div>
      </div>
    </div>
  </div>
  <script src="./lib/save.js"></script>
  <script src="./lib/pause.js"></script>
  <script src="./lib/draw.js"></script>
  <script src="./lib/juice.js"></script>
  <script src="./lib/audio.js"></script>
  <script src="./lib/art.js"></script>
  <script src="./main.js"></script>
</body>
</html>
