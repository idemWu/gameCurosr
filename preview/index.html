<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gameCurosr · 16 款小游戏</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --accent:#38bdf8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 1000px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; }
    p { opacity: .85; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 20px; }
    a.card { display: block; background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 14px; color: inherit; text-decoration: none; }
    a.card:hover { border-color: var(--accent); }
    .cat { font-size: .75rem; opacity: .7; }
    .name { font-weight: 700; margin: 4px 0; }
  </style>
</head>
<body>
  <main>
    <h1>gameCurosr 作品集</h1>
    <p>16 款浏览器小游戏 MVP · 不做种菜 · 点击卡片进入</p>
    <div class="grid" id="grid"></div>
  </main>
  <script>
    fetch("../games/_registry.json").then(r => r.json()).then(data => {
      const grid = document.getElementById("grid");
      grid.innerHTML = data.games.map(g => `
        <a class="card" href="../${g.path}/">
          <div class="cat">${g.category} · ${g.id}</div>
          <div class="name">${g.name}</div>
          <div>${g.loop}</div>
        </a>`).join("");
    });
  </script>
</body>
</html>
