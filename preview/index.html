<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gameCurosr · 16 款精致小品</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #152033;
      --text: #e8eef8;
      --muted: #93a4bd;
      --accent: #56c7ff;
      --line: #2a3b55;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 420px at 0% -10%, rgba(86,199,255,.18), transparent),
        radial-gradient(800px 360px at 100% 0%, rgba(251,191,36,.12), transparent),
        var(--bg);
    }
    main { max-width: 1080px; margin: 0 auto; padding: 28px 20px 48px; }
    h1 { margin: 0 0 8px; font-size: 1.8rem; }
    .lead { margin: 0 0 22px; color: var(--muted); max-width: 62ch; line-height: 1.55; }
    .section { margin-top: 28px; }
    .section h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
      letter-spacing: .04em;
      color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
    }
    a.card {
      display: block;
      background: linear-gradient(180deg, color-mix(in srgb, var(--card) 88%, #fff), var(--card));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
      transition: border-color .15s ease, transform .12s ease;
      min-height: 132px;
    }
    a.card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .cat { font-size: .72rem; color: var(--muted); text-transform: none; }
    .name { font-weight: 800; margin: 6px 0 6px; font-size: 1.05rem; }
    .loop { font-size: .86rem; color: var(--muted); line-height: 1.4; }
    .badge {
      display: inline-block;
      margin-top: 10px;
      font-size: .7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(86,199,255,.14);
      color: #9bdfff;
      border: 1px solid rgba(86,199,255,.28);
    }
  </style>
</head>
<body>
  <main>
    <h1>gameCurosr 作品集</h1>
    <p class="lead">
      16 款浏览器小品 · 治愈 / 轻冒险 / 策略 / 益智 · Vanilla HTML/CSS/JS ·
      聚焦美术、音效与操作反馈 · <strong>不做种菜</strong>
    </p>
    <div id="sections"></div>
  </main>
  <script>
    const ORDER = ["治愈休闲", "轻冒险", "卡牌/放置/策略", "益智/超休闲"];
    fetch("../games/_registry.json").then((r) => r.json()).then((data) => {
      const root = document.getElementById("sections");
      const byCat = {};
      for (const g of data.games) {
        (byCat[g.category] ||= []).push(g);
      }
      root.innerHTML = ORDER.map((cat) => {
        const list = byCat[cat] || [];
        return `
          <section class="section">
            <h2>${cat}</h2>
            <div class="grid">
              ${list.map((g) => `
                <a class="card" href="../${g.path}/">
                  <div class="cat">${g.category} · #${g.id}</div>
                  <div class="name">${g.name}</div>
                  <div class="loop">${g.loop}</div>
                  <span class="badge">精致小品 · 可存档</span>
                </a>
              `).join("")}
            </div>
          </section>`;
      }).join("");
    });
  </script>
</body>
</html>
